name: quickgptbuild
on:
  push:
    branches: [main, test]
  workflow_dispatch:

concurrency:
  group: quickgptbuild-${{ github.ref_name }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  # ───────────────────────────────────────────────
  # Detect changes (optional optimization)
  # ───────────────────────────────────────────────
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  # ───────────────────────────────────────────────
  # BUILD & PUSH (FIXED: ALWAYS SAFE)
  # ───────────────────────────────────────────────
  build-and-push:
    needs: detect-changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set image names
        shell: bash
        run: |
          OWNER_LC="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          REPO_LC="$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')"

          echo "BACKEND_IMAGE=${{ env.REGISTRY }}/${OWNER_LC}/${REPO_LC}-backend" >> $GITHUB_ENV
          echo "FRONTEND_IMAGE=${{ env.REGISTRY }}/${OWNER_LC}/${REPO_LC}-frontend" >> $GITHUB_ENV

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ─────────────────────────────
      # ALWAYS BUILD BACKEND
      # ─────────────────────────────
      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      # ─────────────────────────────
      # ALWAYS BUILD FRONTEND
      # ─────────────────────────────
      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            VITE_CLERK_PUBLISHABLE_KEY=${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}

  # ───────────────────────────────────────────────
  # DEPLOY TO EC2
  # ───────────────────────────────────────────────
  deploy-prod:
    if: github.ref_name == 'main'
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST_PROD }}
          username: ${{ secrets.EC2_USER_PROD }}
          key: ${{ secrets.EC2_SSH_KEY_PROD }}
          source: docker-compose-prod.yml
          target: /var/www/quickgpt

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST_PROD }}
          username: ${{ secrets.EC2_USER_PROD }}
          key: ${{ secrets.EC2_SSH_KEY_PROD }}
          script: |
            set -e
            cd /var/www/quickgpt

            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ secrets.GHCR_USER }}" --password-stdin

            docker compose -f docker-compose-prod.yml down || true
            docker stop quickgpt-frontend 2>/dev/null || true
            docker rm quickgpt-frontend 2>/dev/null || true
            sudo fuser -k 80/tcp 2>/dev/null || true
            sudo systemctl stop nginx 2>/dev/null || true
            docker compose -f docker-compose-prod.yml pull
            docker compose -f docker-compose-prod.yml up -d

            docker compose -f docker-compose-prod.yml ps
            docker compose -f docker-compose-prod.yml logs --tail=50 backend || true
            docker compose -f docker-compose-prod.yml logs --tail=50 frontend || true

            docker image prune -f
