name: quickgptbuild
on:
  push:
    branches: [main, test]
  workflow_dispatch:

concurrency:
  group: quickgptbuild-${{ github.ref_name }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  # ───────────────────────────────────────────────
  # Detect which folders changed
  # ───────────────────────────────────────────────
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  # ───────────────────────────────────────────────
  # Build & push only changed services
  # ───────────────────────────────────────────────
  build-and-push:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image names & environment tag
        shell: bash
        run: |
          OWNER_LC="$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          REPO_LC="$(printf '%s' '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')"

          TAG="latest"

          printf "BACKEND_IMAGE=%s/%s/%s-backend\n" "${{ env.REGISTRY }}" "$OWNER_LC" "$REPO_LC" >> "$GITHUB_ENV"
          printf "FRONTEND_IMAGE=%s/%s/%s-frontend\n" "${{ env.REGISTRY }}" "$OWNER_LC" "$REPO_LC" >> "$GITHUB_ENV"
          printf "IMAGE_TAG=%s\n" "$TAG" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR (push)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        if: needs.detect-changes.outputs.backend == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Build & push frontend
        if: needs.detect-changes.outputs.frontend == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            VITE_CLERK_PUBLISHABLE_KEY=${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}

  # ───────────────────────────────────────────────
  # Deploy to PROD EC2  (triggers on "main" branch)
  # ───────────────────────────────────────────────
  deploy-prod:
    if: github.ref_name == 'main' && !failure() && !cancelled()
    needs: [detect-changes, build-and-push]
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy to Prod EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST_PROD }}
          username: ${{ secrets.EC2_USER_PROD }}
          key: ${{ secrets.EC2_SSH_KEY_PROD }}
          script: |
            set -e
            cd /var/www/quickgpt

            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ secrets.GHCR_USER }}" --password-stdin

            docker compose pull
            docker compose up -d --remove-orphans

            docker compose ps
            docker compose logs --tail=60 backend || true
            docker compose logs --tail=60 frontend || true

            docker image prune -f
